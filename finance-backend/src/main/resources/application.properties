# =============================================
# SERVER CONFIG
# =============================================
server.port=8080

# =============================================
# MYSQL DATABASE CONFIG
# Change username/password to match your MySQL setup
# The database "finance_db" must be created manually first:
#   CREATE DATABASE finance_db;
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE CONFIG
# hibernate.ddl-auto=update means tables are created/updated automatically
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT CONFIG
# secret: a long random string used to sign tokens (change this in production)
# expiration: token valid for 24 hours (in milliseconds)
# =============================================
jwt.secret=finance_dashboard_super_secret_key_that_is_long_enough_for_HS256_algorithm
jwt.expiration=86400000

# =============================================
# APP NAME
# =============================================
spring.application.name=finance-backend
